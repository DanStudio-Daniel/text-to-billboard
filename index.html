<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Text to Image</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@900&family=Playfair+Display:wght@900&family=Roboto+Mono:wght@700&family=Pacifico&family=Permanent+Marker&family=Monoton&family=Special+Elite&family=Outfit:wght@900&display=swap" rel="stylesheet">
  
  <style>
    :root { --selected-font: 'Inter', sans-serif; }
    
    html, body {
      background-color: #f0f2f5; /* Light gray page background to see the transparency on download */
      color: #111;
      width: 1280px; 
      margin: 0 auto;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    #zoomWrapper {
      transform-origin: top left;
      width: 1280px;
    }

    /* CAPTURE AREA STYLES */
    .billboard-container {
      background: transparent; /* Force transparent for capture */
      padding: 40px;
      display: inline-block;
      text-align: center; /* Center the leg */
    }

    .billboard-frame {
      background: #ffffff; /* White board face */
      padding: 15px;
      border: 8px solid #333; /* Slightly sleeker border */
      box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
      width: 600px; /* Wider board */
      position: relative;
      z-index: 2;
    }

    .billboard-display {
      background: transparent; /* Allow text shadow/glow to define edge if needed */
      height: 350px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #billboardText {
      font-family: var(--selected-font);
      color: #000;
      text-align: center;
      padding: 20px;
      width: 100%;
      word-wrap: break-word;
      line-height: 1.1;
      display: block;
    }

    /* THE SINGLE LEG */
    .billboard-leg-container {
      display: flex;
      justify-content: center;
      margin-top: -5px; /* Pull leg up slightly for realistic attachment */
    }
    .leg { 
      width: 60px; /* Thick single support column */
      height: 120px; /* Tall enough to see */
      background: #333; 
      border-radius: 0 0 10px 10px;
    }

    /* WATERMARK SET TO ERICKA */
    .watermark-tag {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #808080; /* Darker watermark to show on transparent */
      margin-top: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* UI STYLES (NOT CAPTURED) */
    .font-menu { max-height: 500px; overflow-y: auto; }
    .font-btn {
      width: 100%; padding: 15px; margin-bottom: 8px;
      border: 2px solid #e2e8f0; border-radius: 8px;
      background: #fff;
      text-align: left; transition: 0.2s; font-size: 1.1rem;
    }
    .font-btn.active { border-color: #111; background: #111; color: #fff; }
    
    .desktop-grid {
      display: grid;
      grid-template-columns: 480px 1fr;
      gap: 60px;
      padding: 60px;
    }
    .control-panel {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div id="zoomWrapper">
    <div class="desktop-grid">
      
      <div class="control-panel space-y-8">
        <h1 class="text-6xl font-black tracking-tighter uppercase text-center border-b-4 border-black pb-4">SIGN GEN</h1>
        
        <div>
          <label class="block text-sm font-bold uppercase mb-3 text-gray-400">Your Message</label>
          <textarea id="textInput" rows="4" class="w-full p-5 border-4 border-gray-200 focus:border-black rounded-lg outline-none text-2xl transition" placeholder="TYPE HERE..."></textarea>
        </div>

        <div>
          <label class="block text-sm font-bold uppercase mb-3 text-gray-400">Typography Style</label>
          <div class="font-menu pr-2">
            <button class="font-btn active" data-font="'Inter', sans-serif" style="font-family: 'Inter'">MODERN SANS</button>
            <button class="font-btn" data-font="'Bebas Neue', cursive" style="font-family: 'Bebas Neue'">BOLD IMPACT</button>
            <button class="font-btn" data-font="'Playfair Display', serif" style="font-family: 'Playfair Display'">ELEGANT SERIF</button>
            <button class="font-btn" data-font="'Pacifico', cursive" style="font-family: 'Pacifico'">RETRO SCRIPT</button>
            <button class="font-btn" data-font="'Permanent Marker', cursive" style="font-family: 'Permanent Marker'">MARKER STYLE</button>
            <button class="font-btn" data-font="'Monoton', cursive" style="font-family: 'Monoton'">NEON LINE</button>
            <button class="font-btn" data-font="'Roboto Mono', monospace" style="font-family: 'Roboto Mono'">TECH MONO</button>
            <button class="font-btn" data-font="'Special Elite', cursive" style="font-family: 'Special Elite'">TYPEWRITER</button>
          </div>
        </div>

        <button id="downloadBtn" class="w-full bg-black text-white py-6 rounded-lg font-bold text-2xl hover:bg-gray-800 transition transform hover:scale-[1.02]">
          download image
        </button>
      </div>

      <div class="flex flex-col items-center justify-center p-10">
        <div id="captureArea" class="billboard-container">
          <div class="billboard-frame">
            <div class="billboard-display">
              <p id="billboardText">YOUR TEXT</p>
            </div>
          </div>
          <div class="billboard-leg-container">
            <div class="leg"></div>
          </div>
          <div class="watermark-tag">@Ericka</div>
        </div>
        <p class="text-gray-400 mt-6 text-sm">Download is high-resolution with a transparent background.</p>
      </div>

    </div>
  </div>

  <script>
    const input = document.getElementById('textInput');
    const billboardText = document.getElementById('billboardText');
    const downloadBtn = document.getElementById('downloadBtn');
    const fontBtns = document.querySelectorAll('.font-btn');
    const display = document.querySelector('.billboard-display');
    const zoomWrapper = document.getElementById('zoomWrapper');

    // 1. AUTO ZOOM + LOCK
    function applyAutoZoom() {
      const targetWidth = 1280;
      const windowWidth = window.innerWidth;
      const scale = windowWidth / targetWidth;
      
      if (windowWidth < targetWidth) {
        zoomWrapper.style.transform = `scale(${scale})`;
      } else {
        zoomWrapper.style.transform = `scale(1)`;
      }
    }

    // 2. AUTO SIZE + LINE BREAKS
    function autoSize() {
      let size = 120; // Starting max size for wider board
      const minSize = 24; 
      billboardText.style.fontSize = size + 'px';

      while (
        (billboardText.scrollHeight > display.clientHeight || 
         billboardText.scrollWidth > display.clientWidth) && 
        size > minSize
      ) {
        size--;
        billboardText.style.fontSize = size + 'px';
      }
    }

    input.addEventListener('input', () => {
      const val = input.value.trim();
      billboardText.innerHTML = val.replace(/\n/g, '<br>') || 'YOUR TEXT';
      autoSize();
    });

    // 3. FONT SELECTOR
    fontBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        fontBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.documentElement.style.setProperty('--selected-font', btn.dataset.font);
        setTimeout(autoSize, 50);
      });
    });

    // 4. DOWNLOAD + FILENAME = INPUT TEXT + TRANSPARENT
    downloadBtn.addEventListener('click', () => {
      const rawName = input.value.trim();
      const fileName = rawName ? rawName.substring(0, 20).replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'ericka_design';

      html2canvas(document.getElementById('captureArea'), {
        backgroundColor: null, // FORCE TRANSPARENT BACKGROUND
        scale: 3 // High resolution export
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `${fileName}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });

    // Initialize
    window.addEventListener('resize', applyAutoZoom);
    window.addEventListener('load', () => {
      applyAutoZoom();
      autoSize();
    });
  </script>
</body>
</html>
