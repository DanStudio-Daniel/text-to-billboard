<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Image</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@900&family=Playfair+Display:wght@900&family=Roboto+Mono:wght@700&family=Pacifico&family=Permanent+Marker&family=Monoton&family=Special+Elite&family=Outfit:wght@900&display=swap" rel="stylesheet">
  
  <style>
    :root { --selected-font: 'Inter', sans-serif; }
    body { background-color: #ffffff; color: #111; }

    /* The Billboard Design */
    .billboard-container {
      background: white;
      padding: 40px 40px 10px 40px;
      display: inline-block;
    }

    .billboard-frame {
      background: #f3f4f6;
      padding: 15px;
      border: 10px solid #111;
      box-shadow: 10px 10px 0px #e5e7eb;
      width: 500px;
    }

    .billboard-display {
      background: #ffffff;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #ddd;
      position: relative;
    }

    #billboardText {
      font-family: var(--selected-font);
      color: #000;
      text-align: center;
      padding: 0 20px;
      word-break: break-all;
    }

    .billboard-legs {
      display: flex;
      justify-content: space-around;
      width: 500px;
    }

    .leg { width: 20px; height: 40px; background: #111; }

    .watermark-tag {
      text-align: right;
      font-family: sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: #9ca3af;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Scrollable Font Menu */
    .font-menu {
      max-height: 400px;
      overflow-y: auto;
    }
    .font-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      text-align: left;
      transition: 0.2s;
    }
    .font-btn.active {
      border-color: #000;
      background: #f9fafb;
      font-weight: bold;
    }
  </style>
</head>
<body class="p-10">

  <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12">
    
    <div class="space-y-6">
      <h1 class="text-5xl font-black italic tracking-tighter mb-8">TEXT TO IMAGE</h1>
      
      <div>
        <label class="block text-xs font-bold uppercase mb-2">1. Your Message</label>
        <textarea id="textInput" rows="2" class="w-full p-4 border-2 border-black rounded-none focus:bg-yellow-50 outline-none text-xl" placeholder="ENTER TEXT..."></textarea>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase mb-2">2. Choose Font Style</label>
        <div class="font-menu pr-2" id="fontGrid">
          <button class="font-btn active" data-font="'Inter', sans-serif" style="font-family: 'Inter'">MODERN SANS</button>
          <button class="font-btn" data-font="'Bebas Neue', cursive" style="font-family: 'Bebas Neue'">BOLD IMPACT</button>
          <button class="font-btn" data-font="'Playfair Display', serif" style="font-family: 'Playfair Display'">ELEGANT SERIF</button>
          <button class="font-btn" data-font="'Pacifico', cursive" style="font-family: 'Pacifico'">RETRO SCRIPT</button>
          <button class="font-btn" data-font="'Permanent Marker', cursive" style="font-family: 'Permanent Marker'">MARKER STYLE</button>
          <button class="font-btn" data-font="'Monoton', cursive" style="font-family: 'Monoton'">NEON LINE</button>
          <button class="font-btn" data-font="'Roboto Mono', monospace" style="font-family: 'Roboto Mono'">TECH MONO</button>
          <button class="font-btn" data-font="'Special Elite', cursive" style="font-family: 'Special Elite'">TYPEWRITER</button>
          <button class="font-btn" data-font="'Outfit', sans-serif" style="font-family: 'Outfit'">GEOMETRIC</button>
        </div>
      </div>

      <button id="downloadBtn" class="w-full bg-black text-white py-5 font-bold text-xl hover:scale-[1.02] transition-transform">
        EXPORT PNG
      </button>
    </div>

    <div class="flex flex-col items-center justify-center bg-gray-50 rounded-2xl p-10 border-2 border-dashed border-gray-200">
      <div id="captureArea" class="billboard-container">
        <div class="billboard-frame">
          <div class="billboard-display">
            <p id="billboardText">YOUR TEXT</p>
          </div>
        </div>
        <div class="billboard-legs">
          <div class="leg"></div>
          <div class="leg"></div>
        </div>
        <div class="watermark-tag">Azuki & Ericka</div>
      </div>
    </div>

  </div>

  <script>
    const input = document.getElementById('textInput');
    const billboardText = document.getElementById('billboardText');
    const downloadBtn = document.getElementById('downloadBtn');
    const fontBtns = document.querySelectorAll('.font-btn');

    // Dynamic Font Resizer
    function autoSize() {
      const display = document.querySelector('.billboard-display');
      let size = 120;
      billboardText.style.fontSize = size + 'px';

      while ((billboardText.offsetWidth > display.offsetWidth - 40 || 
              billboardText.offsetHeight > display.offsetHeight - 20) && size > 10) {
        size--;
        billboardText.style.fontSize = size + 'px';
      }
    }

    input.addEventListener('input', () => {
      billboardText.textContent = input.value || 'YOUR TEXT';
      autoSize();
    });

    // Font Switcher
    fontBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        fontBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.documentElement.style.setProperty('--selected-font', btn.dataset.font);
        setTimeout(autoSize, 50);
      });
    });

    // Capture & Download
    downloadBtn.addEventListener('click', () => {
      html2canvas(document.getElementById('captureArea'), {
        backgroundColor: "#ffffff",
        scale: 3
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'azuki-design.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    });

    window.onload = autoSize;
  </script>
</body>
  </html>
