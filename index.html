<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Billboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @keyframes glow {
      0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff0; }
      100% { text-shadow: 0 0 10px #fff, 0 0 20px #f80; }
    }
    .billboard-text {
      animation: glow 2s infinite alternate;
      white-space: nowrap;
      font-family: 'Arial Black', sans-serif;
      letter-spacing: -1px;
    }
    .watermark {
      position: absolute;
      bottom: 5%;
      right: 5%;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      font-weight: bold;
    }
    .bg-option {
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s ease;
      height: 60px;
      object-fit: cover;
      width: 100%;
      border-radius: 8px;
    }
    .bg-option.selected {
      border-color: #2563eb;
      box-shadow: 0 0 10px #2563eb;
    }
    /* perspective container to make text look slightly angled */
    .billboard-surface {
      perspective: 1000px;
    }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center p-6 text-white">

  <h1 class="text-3xl font-bold mb-6">📢 Real Billboard Generator</h1>

  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6 mb-6 text-gray-800">
    <label class="block text-gray-700 font-semibold mb-2">Enter your message:</label>
    <input 
      type="text" 
      id="textInput" 
      placeholder="YOUR AD HERE"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
    >

    <label class="block text-gray-700 font-semibold mt-4 mb-2">Choose Billboard Location:</label>
    <div class="grid grid-cols-3 gap-3">
      <img class="bg-option selected" 
           data-src="https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&w=1200&q=80" 
           src="https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&w=300&q=80" alt="Highway">
      <img class="bg-option" 
           data-src="https://images.unsplash.com/photo-1518112166137-8590059344c5?auto=format&fit=crop&w=1200&q=80" 
           src="https://images.unsplash.com/photo-1518112166137-8590059344c5?auto=format&fit=crop&w=300&q=80" alt="Urban">
      <img class="bg-option" 
           data-src="https://images.unsplash.com/photo-1610444315266-993d09a501a3?auto=format&fit=crop&w=1200&q=80" 
           src="https://images.unsplash.com/photo-1610444315266-993d09a501a3?auto=format&fit=crop&w=300&q=80" alt="Building">
    </div>

    <button id="downloadBtn" class="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition">
      📥 Save Advertisement
    </button>
  </div>

  <div id="billboardContainer" class="relative w-full max-w-2xl overflow-hidden rounded-xl shadow-2xl">
    <img 
      id="billboardImage"
      src="https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&w=1200&q=80" 
      alt="Billboard"
      class="w-full"
      crossorigin="anonymous"
    >
    
    <div id="textOverlay" class="absolute top-[28%] left-[24%] w-[51%] h-[35%] flex items-center justify-center overflow-hidden">
      <p id="billboardText" class="billboard-text text-white font-bold uppercase">
        YOUR AD HERE
      </p>
    </div>
    
    <div class="watermark">@azuki</div>
  </div>

  <script>
    const input = document.getElementById('textInput');
    const billboardText = document.getElementById('billboardText');
    const billboardImage = document.getElementById('billboardImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const container = document.getElementById('billboardContainer');
    const textOverlay = document.getElementById('textOverlay');
    const bgOptions = document.querySelectorAll('.bg-option');

    // Custom coordinates for each image to match the "hole" in the billboard
    const layouts = {
      "https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?auto=format&fit=crop&w=1200&q=80": { top: '28%', left: '24%', width: '51%', height: '35%', rotate: '0deg' },
      "https://images.unsplash.com/photo-1518112166137-8590059344c5?auto=format&fit=crop&w=1200&q=80": { top: '15%', left: '33%', width: '30%', height: '55%', rotate: '0deg' },
      "https://images.unsplash.com/photo-1610444315266-993d09a501a3?auto=format&fit=crop&w=1200&q=80": { top: '18%', left: '33%', width: '34%', height: '44%', rotate: '0deg' }
    };

    function fitText() {
      const containerWidth = textOverlay.clientWidth;
      const textLength = billboardText.textContent.length || 1;
      const fontSize = Math.min(60, (containerWidth * 1.8) / textLength);
      billboardText.style.fontSize = fontSize + 'px';
    }

    input.addEventListener('input', () => {
      billboardText.textContent = input.value || 'YOUR AD HERE';
      fitText();
    });

    window.addEventListener('resize', fitText);

    bgOptions.forEach(img => {
      img.addEventListener('click', () => {
        bgOptions.forEach(opt => opt.classList.remove('selected'));
        img.classList.add('selected');
        
        const src = img.dataset.src;
        billboardImage.src = src;
        
        // Update overlay position based on the selected image
        const layout = layouts[src];
        textOverlay.style.top = layout.top;
        textOverlay.style.left = layout.left;
        textOverlay.style.width = layout.width;
        textOverlay.style.height = layout.height;
        
        setTimeout(fitText, 50);
      });
    });

    downloadBtn.addEventListener('click', () => {
      html2canvas(container, { 
        useCORS: true,
        scale: 2 // Higher quality download
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'my-billboard.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    });

    // Initial fit
    setTimeout(fitText, 500);
  </script>

</body>
  </html>
