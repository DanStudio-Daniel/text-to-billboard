<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Billboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @keyframes glow {
      0% { text-shadow: 0 0 10px #fff, 0 0 20px #ff0, 0 0 30px #ff0; }
      100% { text-shadow: 0 0 20px #fff, 0 0 30px #f80, 0 0 40px #f80; }
    }
    .billboard-text {
      animation: glow 2s infinite alternate;
      white-space: nowrap;
    }
    .watermark {
      position: absolute;
      bottom: 12%;
      right: 18%;
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 0 0 5px #000;
    }
    .bg-option {
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.2s ease;
    }
    .bg-option.selected {
      border-color: #2563eb;
      box-shadow: 0 0 10px #2563eb;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">

  <h1 class="text-3xl font-bold mb-6 text-gray-800">📢 Text to Billboard</h1>

  <!-- Input Area -->
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6 mb-6">
    <label class="block text-gray-700 font-semibold mb-2">Enter your text:</label>
    <input 
      type="text" 
      id="textInput" 
      placeholder="Type something amazing..."
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
    >

    <!-- Background Selection -->
    <label class="block text-gray-700 font-semibold mt-4 mb-2">Choose billboard style:</label>
    <div class="grid grid-cols-3 gap-3">
      <img class="bg-option selected" data-src="https://images.unsplash.com/photo-1588507050026-88d042c3c001?auto=format&fit=crop&w=1200&q=80" src="https://images.unsplash.com/photo-1588507050026-88d042c3c001?auto=format&fit=crop&w=300&q=80" alt="Style 1">
      <img class="bg-option" data-src="https://images.unsplash.com/photo-1542204165-65bf26472b9b?auto=format&fit=crop&w=1200&q=80" src="https://images.unsplash.com/photo-1542204165-65bf26472b9b?auto=format&fit=crop&w=300&q=80" alt="Style 2">
      <img class="bg-option" data-src="https://images.unsplash.com/photo-1557180295-68772c7761e6?auto=format&fit=crop&w=1200&q=80" src="https://images.unsplash.com/photo-1557180295-68772c7761e6?auto=format&fit=crop&w=300&q=80" alt="Style 3">
    </div>

    <button 
      id="downloadBtn"
      class="mt-4 w-full py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-lg transition"
    >
      📥 Download Image
    </button>
  </div>

  <!-- Billboard -->
  <div id="billboardContainer" class="relative w-full max-w-2xl">
    <img 
      id="billboardImage"
      src="https://images.unsplash.com/photo-1588507050026-88d042c3c001?auto=format&fit=crop&w=1200&q=80" 
      alt="Billboard"
      class="w-full rounded-xl shadow-2xl"
      crossorigin="anonymous"
    >
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[70%] text-center">
      <p 
        id="billboardText" 
        class="billboard-text text-white font-bold uppercase"
      >
        Your Text Here
      </p>
    </div>
    <div class="watermark">@azuki</div>
  </div>

  <script>
    const input = document.getElementById('textInput');
    const billboardText = document.getElementById('billboardText');
    const billboardImage = document.getElementById('billboardImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const container = document.getElementById('billboardContainer');
    const bgOptions = document.querySelectorAll('.bg-option');

    // Auto fit text
    function fitText() {
      const containerWidth = billboardText.parentElement.clientWidth;
      const textLength = billboardText.textContent.length;
      const fontSize = Math.min(80, containerWidth / (textLength * 0.6));
      billboardText.style.fontSize = fontSize + 'px';
    }

    input.addEventListener('input', () => {
      billboardText.textContent = input.value || 'Your Text Here';
      fitText();
    });

    window.addEventListener('resize', fitText);
    fitText();

    // Change background
    bgOptions.forEach(img => {
      img.addEventListener('click', () => {
        bgOptions.forEach(opt => opt.classList.remove('selected'));
        img.classList.add('selected');
        billboardImage.src = img.dataset.src;
      });
    });

    // Download image
    downloadBtn.addEventListener('click', () => {
      html2canvas(container, { useCORS: true }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'billboard-image.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    });
  </script>

</body>
</html>
